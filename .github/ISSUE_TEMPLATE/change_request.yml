name: "Enterprise Engineering Change Record"

description: >
  Submit a governed EXODUS architecture, design, implementation,
  validation, remediation, troubleshooting, documentation,
  operational, automation, cloud, security, reliability,
  or platform engineering activity.

title: "[CR-XXX] "

labels:
  - change-request
  - review-required

assignees: []

body:

################################################################################
# TEMPLATE INFORMATION
################################################################################

  - type: markdown
    attributes:
      value: |
        # EXODUS Enterprise Engineering Change Record

        **Template Version:** 4.0  
        **Version Classification:** Major

        **Engineering justification**

        Version 4.0 expands the Enterprise Engineering Change Record
        into the canonical governance template for the complete EXODUS
        engineering lifecycle.

        It supports:

        - On-premises infrastructure
        - Linux and Windows platforms
        - Identity and access management
        - Monitoring and logging
        - Infrastructure automation
        - Infrastructure as Code
        - CI/CD
        - Cloud engineering
        - Containers and Kubernetes
        - GitOps
        - Security engineering
        - Backup and disaster recovery
        - Site Reliability Engineering
        - Platform engineering

        The established engineering lifecycle remains:

        Architecture  
        ↓  
        Design  
        ↓  
        Engineering Decision  
        ↓  
        Controlled Implementation  
        ↓  
        Runtime Validation  
        ↓  
        Documentation  
        ↓  
        Knowledge Capture  
        ↓  
        Formal Closure

        The permanent EXODUS engineering workflow remains:

        Known Good  
        ↓  
        Extract  
        ↓  
        Compare  
        ↓  
        Decide  
        ↓  
        Implement  
        ↓  
        Validate  
        ↓  
        Document

        Complete planning fields before implementation.

        Never invent commands, results, runtime evidence,
        validation evidence, or closure evidence.

################################################################################
# ENGINEERING IDENTIFICATION
################################################################################

  - type: input
    id: change_request_id
    attributes:
      label: Engineering Change Record ID
      description: Enter the governed EXODUS Change Request or child issue identifier.
      placeholder: CR-013.001
    validations:
      required: true

  - type: input
    id: parent_change_request
    attributes:
      label: Parent Change Request
      description: Enter the parent EXODUS Change Request.
      placeholder: CR-013 — Phase 6 Automation Governance Foundation
    validations:
      required: true

  - type: input
    id: parent_github_issue
    attributes:
      label: Parent GitHub Issue
      description: Enter the parent issue number or Not Applicable.
      placeholder: "#17"
    validations:
      required: true

  - type: input
    id: engineering_phase
    attributes:
      label: Engineering Phase
      placeholder: Phase 6.6.8
    validations:
      required: true

  - type: input
    id: worksheet
    attributes:
      label: Engineering Worksheet
      placeholder: 06.6w
    validations:
      required: true

  - type: input
    id: github_milestone
    attributes:
      label: GitHub Milestone
      placeholder: EXODUS-Sprint-Phase6-Automation
    validations:
      required: true

################################################################################
# ENGINEERING CLASSIFICATION
################################################################################

  - type: dropdown
    id: engineering_record_type
    attributes:
      label: Engineering Record Type
      options:
        - Operational Engineering Change Record
        - Platform Engineering Change Record
        - Programme Engineering Change Record
        - Architecture Decision Record
        - Troubleshooting and Remediation Record
        - Security Engineering Record
        - Reliability Engineering Record
        - Documentation and Governance Record
    validations:
      required: true

  - type: dropdown
    id: engineering_domain
    attributes:
      label: Primary Engineering Domain
      options:
        - Enterprise Architecture
        - Platform Engineering
        - Linux
        - Windows
        - Identity and Access Management
        - Active Directory
        - Networking
        - DNS
        - Storage
        - Security
        - Monitoring
        - Logging
        - Automation
        - Infrastructure as Code
        - Git
        - GitHub
        - CI/CD
        - Cloud
        - Containers
        - Kubernetes
        - Service Mesh
        - GitOps
        - Backup and Disaster Recovery
        - Site Reliability Engineering
        - Internal Developer Platform
        - Documentation
        - Governance
        - Change Management
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Change Type
      options:
        - Architecture
        - Design
        - New Implementation
        - Enhancement
        - Validation
        - Remediation
        - Troubleshooting
        - Standardisation
        - Operational Runbook
        - Documentation
        - Governance
        - Migration
        - Upgrade
        - Retirement
        - Emergency Change
    validations:
      required: true

  - type: dropdown
    id: business_priority
    attributes:
      label: Business Priority
      description: Priority records urgency. It is separate from engineering risk.
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: target_environment
    attributes:
      label: Target Environment
      options:
        - Laboratory
        - Development
        - Test
        - Staging
        - Production
        - Disaster Recovery
        - Multiple Environments
        - Not Applicable
    validations:
      required: true

  - type: dropdown
    id: deployment_model
    attributes:
      label: Deployment Model
      options:
        - On-Premises
        - AWS
        - Azure
        - Google Cloud
        - Hybrid Cloud
        - Multi-Cloud
        - SaaS or Managed Service
        - Not Applicable
    validations:
      required: true

  - type: dropdown
    id: affected_platforms
    attributes:
      label: Affected Platforms or Services
      description: Select every platform or service materially affected.
      multiple: true
      options:
        - VMware and Virtualisation
        - Linux Platform
        - Windows Platform
        - Identity and Access Management
        - Active Directory
        - DNS and Networking
        - Ingress and Load Balancing
        - Monitoring and Alerting
        - Logging and Security Analytics
        - Automation Control Plane
        - Git and GitHub
        - CI/CD Platform
        - Container Platform
        - Kubernetes
        - Service Mesh
        - GitOps Platform
        - Backup and Disaster Recovery
        - Cloud Platform
        - Internal Developer Platform
        - Documentation and Governance
        - Not Applicable
    validations:
      required: true

  - type: textarea
    id: technology_stack
    attributes:
      label: Technology Stack
      description: >
        List the products, platforms, operating systems, protocols,
        modules, providers, operators, services, languages,
        frameworks, and repositories involved.
      placeholder: |
        RHEL 9
        Ansible Core 2.14
        GitHub
        Prometheus
        Terraform
        AWS
        Kubernetes
    validations:
      required: true

################################################################################
# ENGINEERING ASSIGNMENT
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Engineering Assignment

        **Professional explanation**

        This section establishes engineering ownership,
        accountability, support level, decision authority,
        execution responsibility, and review responsibility.

        **Layman's explanation**

        This records who is doing the work, who is leading,
        who makes the final technical decision, and who checks
        that the work was completed correctly.

  - type: input
    id: engineer_name
    attributes:
      label: Engineer Name
      placeholder: Abiola Osota
    validations:
      required: true

  - type: input
    id: primary_engineer_role
    attributes:
      label: Primary Engineer and Role
      placeholder: Abiola Osota — Platform Engineer (L3)
    validations:
      required: true

  - type: textarea
    id: supporting_engineers
    attributes:
      label: Supporting Engineers
      description: Enter supporting engineers, reviewers, architects, or Not Applicable.
      placeholder: |
        Enterprise Architect
        Senior Linux Engineer
        Senior DevOps Engineer
    validations:
      required: true

  - type: dropdown
    id: support_level
    attributes:
      label: Engineering Support Level
      options:
        - L1
        - L2
        - L3
        - Enterprise Architect
        - L2 Execution with L3 Governance
        - L3 Execution with Enterprise Architect Oversight
    validations:
      required: true

  - type: input
    id: engineering_decision_owner
    attributes:
      label: Engineering Decision Owner
      placeholder: Enterprise Architect
    validations:
      required: true

  - type: input
    id: engineering_reviewer
    attributes:
      label: Engineering Reviewer
      placeholder: Platform Engineer (L3)
    validations:
      required: true

################################################################################
# ENGINEERING CONTEXT
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Engineering Context

        **Professional explanation**

        Engineering work begins by defining the business need,
        technical objective, problem statement, timing, scope,
        and expected outcome before implementation begins.

        **Layman's explanation**

        Explain what needs to be done, why it matters,
        why it is being done now, and what a successful result
        should look like.

  - type: textarea
    id: business_objective
    attributes:
      label: Business Objective
      description: Explain the operational or organisational value.
    validations:
      required: true

  - type: textarea
    id: engineering_objective
    attributes:
      label: Engineering Objective
      description: Explain the required technical outcome.
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Describe the validated problem, requirement, or capability gap.
    validations:
      required: true

  - type: textarea
    id: engineering_question
    attributes:
      label: Engineering Question
      description: State the main engineering question this activity must answer.
    validations:
      required: true

  - type: textarea
    id: why_this_activity_exists
    attributes:
      label: Why This Engineering Activity Exists
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: Why Now
      description: Explain why this work is required at this stage of the programme.
    validations:
      required: true

  - type: textarea
    id: expected_engineering_outcome
    attributes:
      label: Expected Engineering Outcome
    validations:
      required: true

################################################################################
# AUTHORITATIVE CONTEXT
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Authoritative Context

        **Professional explanation**

        All engineering decisions must be traceable to controlled
        sources and validated evidence.

        **Layman's explanation**

        Record where the information came from so nobody needs
        to rely on memory or guesswork.

  - type: textarea
    id: authoritative_sources
    attributes:
      label: Authoritative Sources
      description: >
        Reference the Authoritative Archive, current handoff,
        architecture documents, standards, issues, runbooks,
        vendor documentation, and validated runtime evidence.
      placeholder: |
        EXODUS_AUTHORITATIVE_MASTER_ARCHIVE.yaml
        Current engineering handoff
        GitHub issue #17
        Vendor documentation
    validations:
      required: true

  - type: textarea
    id: known_good_reference
    attributes:
      label: Known-Good Reference
      description: Identify the known-good system, configuration, process, or baseline.
    validations:
      required: true

  - type: textarea
    id: current_state_evidence
    attributes:
      label: Current-State Evidence
      description: Record validated evidence describing the current state.
    validations:
      required: true

  - type: textarea
    id: comparison_summary
    attributes:
      label: Known-Good Comparison Summary
      description: Explain the differences between the current state and known-good reference.
    validations:
      required: true

################################################################################
# CONFIGURATION DIFFERENCE CLASSIFICATION
################################################################################

  - type: dropdown
    id: configuration_difference_classification
    attributes:
      label: Configuration Difference Classification
      description: >
        Never classify configuration drift from textual difference alone.
        Validate architectural history, runtime behaviour, and operational impact.
      options:
        - No Difference
        - Approved Architectural Decision
        - Historical Implementation Difference
        - Documentation Gap
        - Configuration Drift
        - Operational Drift
        - Security Drift
        - Governance Drift
        - Investigation Required
        - Not Applicable
    validations:
      required: true

  - type: textarea
    id: difference_classification_evidence
    attributes:
      label: Difference Classification Evidence
      description: >
        Record architectural history, runtime validation,
        operational impact, and evidence supporting the classification.
    validations:
      required: true

################################################################################
# ARCHITECTURE AND DESIGN
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Architecture and Design

        **Professional explanation**

        Architecture defines the required capability and governing
        principles. Design defines how the approved architecture
        will be implemented.

        **Layman's explanation**

        Architecture explains what the solution must achieve.
        Design explains how it will be built.

  - type: textarea
    id: architecture_summary
    attributes:
      label: Architecture Summary
      description: Describe the approved target architecture and governing principles.
    validations:
      required: true

  - type: textarea
    id: design_summary
    attributes:
      label: Design Summary
      description: Describe the proposed implementation design.
    validations:
      required: true

  - type: textarea
    id: architecture_constraints
    attributes:
      label: Architecture Constraints
      description: Record technical, security, governance, operational, or platform constraints.
    validations:
      required: true

  - type: textarea
    id: assumptions
    attributes:
      label: Assumptions
      description: Record assumptions requiring validation. Enter None if no assumptions exist.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Engineering Dependencies
      description: Record systems, teams, services, issues, approvals, or artefacts required.
    validations:
      required: true

################################################################################
# ENGINEERING DECISION
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Engineering Decision

        **Professional explanation**

        Record the selected technical decision, supporting evidence,
        considered alternatives, rejected alternatives, trade-offs,
        and consequences.

        **Layman's explanation**

        Explain what option was chosen, why it was chosen,
        what other options were considered, and why they were not used.

  - type: textarea
    id: engineering_decision
    attributes:
      label: Engineering Decision
    validations:
      required: true

  - type: textarea
    id: engineering_reason
    attributes:
      label: Engineering Reason
      description: Explain why the selected decision is technically and operationally appropriate.
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives Considered
    validations:
      required: true

  - type: textarea
    id: rejected_alternatives
    attributes:
      label: Rejected Alternatives and Reasons
    validations:
      required: true

  - type: textarea
    id: decision_tradeoffs
    attributes:
      label: Decision Trade-Offs
      description: Record benefits, limitations, costs, complexity, and operational consequences.
    validations:
      required: true

  - type: textarea
    id: decision_evidence
    attributes:
      label: Decision Evidence
      description: Record evidence supporting the engineering decision.
    validations:
      required: true

################################################################################
# ENTERPRISE STANDARD ADOPTION
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Enterprise Standard Adoption

        Record every enterprise standard, methodology,
        control, framework, or best practice adopted.

  - type: textarea
    id: enterprise_standards_adopted
    attributes:
      label: Enterprise Standards Adopted
      placeholder: |
        Separation of Duties
        Least Privilege
        Infrastructure as Code
        Idempotency
        Validation Gates
        Change Enablement
    validations:
      required: true

  - type: textarea
    id: standard_professional_explanation
    attributes:
      label: Professional Explanation of the Standards
      description: Explain what each standard means and why enterprises adopt it.
    validations:
      required: true

  - type: textarea
    id: standard_layman_explanation
    attributes:
      label: Layman's Explanation of the Standards
      description: Explain the same standards in simple language.
    validations:
      required: true

  - type: textarea
    id: standard_exodus_application
    attributes:
      label: Application to EXODUS
      description: Explain how each standard applies to the current engineering activity.
    validations:
      required: true

  - type: textarea
    id: risk_if_standard_ignored
    attributes:
      label: Risk if the Standard Is Ignored
    validations:
      required: true

################################################################################
# INTERVIEW PERSPECTIVE
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Interview Perspective

        Every significant engineering activity must support
        professional learning and interview preparation.

  - type: textarea
    id: professional_interview_question
    attributes:
      label: Professional Interview Question
    validations:
      required: true

  - type: textarea
    id: professional_interview_answer
    attributes:
      label: Professional Interview Answer
      description: Answer using enterprise terminology and engineering best practices.
    validations:
      required: true

  - type: textarea
    id: layman_interview_question
    attributes:
      label: Layman's Interview Question
      description: Rephrase the same concept in simple language.
    validations:
      required: true

  - type: textarea
    id: layman_interview_answer
    attributes:
      label: Layman's Interview Answer
    validations:
      required: true

  - type: textarea
    id: interview_follow_up_questions
    attributes:
      label: Common Interview Follow-Up Questions
    validations:
      required: true

  - type: textarea
    id: interview_common_mistakes
    attributes:
      label: Common Interview Mistakes
    validations:
      required: true

################################################################################
# SCOPE
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Engineering Scope

        Define exactly what is included and excluded.

  - type: textarea
    id: in_scope
    attributes:
      label: In Scope
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
    validations:
      required: true

  - type: textarea
    id: affected_assets
    attributes:
      label: Affected Assets
      description: >
        List hosts, clusters, services, applications,
        repositories, networks, accounts, environments,
        subscriptions, projects, or namespaces.
    validations:
      required: true

################################################################################
# ISSUE RELATIONSHIPS
################################################################################

  - type: input
    id: blocked_by
    attributes:
      label: Blocked By
      placeholder: "#20 or Not Applicable"
    validations:
      required: true

  - type: input
    id: blocks
    attributes:
      label: Blocks
      placeholder: "#24 or Not Applicable"
    validations:
      required: true

  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues and Engineering Records
      placeholder: |
        #17
        #21
        CR-013
        ADR-004
    validations:
      required: true

################################################################################
# RISK AND GOVERNANCE
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Risk and Governance

        **Professional explanation**

        Risk assessment identifies the probability and impact
        of failure before implementation and establishes controls
        to reduce operational exposure.

        **Layman's explanation**

        Think about what could go wrong before making changes,
        then prepare how to reduce the damage or recover safely.

  - type: dropdown
    id: risk_level
    attributes:
      label: Engineering Risk Level
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: blast_radius
    attributes:
      label: Potential Blast Radius
      options:
        - Single File or Document
        - Single User
        - Single Host
        - Multiple Hosts
        - Single Service
        - Multiple Services
        - Single Environment
        - Multiple Environments
        - Organisation-Wide
        - Not Applicable
    validations:
      required: true

  - type: textarea
    id: identified_risks
    attributes:
      label: Identified Risks
    validations:
      required: true

  - type: textarea
    id: risk_mitigation
    attributes:
      label: Risk Mitigation
    validations:
      required: true

  - type: textarea
    id: failure_impact
    attributes:
      label: Potential Failure Impact
    validations:
      required: true

  - type: textarea
    id: operational_impact
    attributes:
      label: Operational Impact
    validations:
      required: true

  - type: textarea
    id: security_impact
    attributes:
      label: Security Impact
    validations:
      required: true

################################################################################
# CHANGE WINDOW AND APPROVAL
################################################################################

  - type: dropdown
    id: change_window
    attributes:
      label: Change Window
      options:
        - No Runtime Change
        - Laboratory Execution
        - Standard Business Hours
        - Approved Maintenance Window
        - Emergency Change Window
        - Continuous Delivery Window
        - Not Applicable
    validations:
      required: true

  - type: dropdown
    id: approval_status
    attributes:
      label: Approval Status
      options:
        - Not Required
        - Pending
        - Approved
        - Conditionally Approved
        - Rejected
    validations:
      required: true

  - type: textarea
    id: approval_evidence
    attributes:
      label: Approval Evidence
      description: Record approval authority, review evidence, conditions, or Not Applicable.
    validations:
      required: true

################################################################################
# SECURITY, DATA, AND COMPLIANCE
################################################################################

  - type: dropdown
    id: data_classification
    attributes:
      label: Data Classification
      options:
        - Public
        - Internal
        - Confidential
        - Restricted
        - No Data Involved
        - Not Applicable
    validations:
      required: true

  - type: dropdown
    id: security_change_classification
    attributes:
      label: Security Change Classification
      options:
        - No Security Change
        - Authentication Change
        - Authorisation Change
        - Network Security Change
        - Encryption or Key Management Change
        - Secrets Management Change
        - Vulnerability Remediation
        - Security Hardening
        - Logging or Audit Change
        - Multiple Security Domains
        - Not Applicable
    validations:
      required: true

  - type: textarea
    id: least_privilege_assessment
    attributes:
      label: Least-Privilege Assessment
    validations:
      required: true

  - type: textarea
    id: secrets_and_credentials
    attributes:
      label: Secrets and Credentials Impact
      description: Record credential handling, secret storage, key rotation, exposure risk, or Not Applicable.
    validations:
      required: true

  - type: textarea
    id: compliance_impact
    attributes:
      label: Compliance and Policy Impact
      description: Record relevant regulatory, contractual, security, organisational, or governance controls.
    validations:
      required: true

################################################################################
# VERSION GOVERNANCE
################################################################################

  - type: dropdown
    id: version_change_required
    attributes:
      label: Does This Activity Change a Versioned Artefact?
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: dropdown
    id: version_change_type
    attributes:
      label: Version Change Classification
      options:
        - Not Applicable
        - Major
        - Minor
        - Patch
    validations:
      required: true

  - type: input
    id: current_version
    attributes:
      label: Current Version
      placeholder: 3.0 or Not Applicable
    validations:
      required: true

  - type: input
    id: proposed_version
    attributes:
      label: Proposed Version
      placeholder: 4.0 or Not Applicable
    validations:
      required: true

  - type: textarea
    id: version_change_reason
    attributes:
      label: Version Change Reason
      description: Explain why the version must change.
    validations:
      required: true

  - type: textarea
    id: version_level_justification
    attributes:
      label: Version Level Engineering Justification
      description: Explain why major, minor, patch, or Not Applicable is appropriate.
    validations:
      required: true

################################################################################
# PRECONDITIONS
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Preconditions

        Record everything that must be true before implementation begins.

  - type: textarea
    id: technical_preconditions
    attributes:
      label: Technical Preconditions
    validations:
      required: true

  - type: textarea
    id: governance_preconditions
    attributes:
      label: Governance Preconditions
    validations:
      required: true

  - type: textarea
    id: access_preconditions
    attributes:
      label: Access and Permission Preconditions
    validations:
      required: true

  - type: textarea
    id: backup_snapshot_preconditions
    attributes:
      label: Backup, Snapshot, or Recovery Preconditions
    validations:
      required: true

  - type: checkboxes
    id: pre_execution_gate
    attributes:
      label: Pre-Execution Gate
      options:
        - label: Authoritative sources reviewed
          required: true
        - label: Current state validated
          required: true
        - label: Known-good reference identified
          required: true
        - label: Architecture and design reviewed
          required: true
        - label: Risk and rollback assessed
          required: true
        - label: Required access confirmed
          required: true
        - label: Implementation sequence reviewed
          required: true

################################################################################
# IMPLEMENTATION PLAN
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Controlled Implementation Plan

        Document the implementation sequence before commands are executed.

  - type: textarea
    id: implementation_plan
    attributes:
      label: Implementation Plan
      description: Provide the ordered implementation steps.
    validations:
      required: true

  - type: textarea
    id: execution_context
    attributes:
      label: Execution Context
      description: >
        Record the expected prompt, workstation, control plane,
        repository, host, cluster, namespace, account, subscription,
        region, or execution environment.
      placeholder: AB@Desktop ~/exodus-change-management $
    validations:
      required: true

  - type: dropdown
    id: implementation_method
    attributes:
      label: Implementation Method
      options:
        - Manual Command
        - Script
        - Ansible
        - Terraform
        - CloudFormation
        - GitHub Actions
        - Jenkins
        - Kubernetes Manifest
        - Helm
        - Argo CD
        - API
        - Configuration File
        - Documentation Only
        - Multiple Methods
    validations:
      required: true

  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected Outcome
    validations:
      required: true

################################################################################
# COMMAND GOVERNANCE
################################################################################

  - type: markdown
    attributes:
      value: |
        ## Command Governance

        For every command, document:

        - Engineering decision
        - Engineering reason
        - Risk
        - Expected outcome
        - Validation method
        - Rollback method
        - Professional explanation
        - Layman's explanation
        - Every flag, option, module, and argument

        Short commands remain on one line.

        Long commands must be wrapped for readability.

        When wrapping commands:

        - Keep the opening quote on the first line.
        - Keep the closing quote on the final command line.
        - Do not create unnecessary horizontal scrolling.
        - Execute one command at a time.

  - type: textarea
    id: commands_planned
    attributes:
      label: Planned Commands or Configuration Changes
      render: shell
      description: Enter planned commands only. Do not invent executed output.
    validations:
      required: true

